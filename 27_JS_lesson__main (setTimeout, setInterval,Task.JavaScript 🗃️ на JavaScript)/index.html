<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>Управление таймером</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
<div class="input-group">
    <label for="delay-input">Задержка (в секундах):</label>
    <input type="number" id="delay-input" value="2" min="1">
</div>
<div class="input-group">
    <label for="text-input">Текст сообщения:</label>
    <input type="text" id="text-input" value="Привет из таймера!">
</div>
<button id="toggle-btn" class="btn-start">Начать</button>
</div>
<script src="script.js"></script>
</body>
</html>
