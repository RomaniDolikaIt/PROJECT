<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>LocalStorage и SessionStorage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="card">
        <h3>💵 Добавить новый расход</h3>

        <label for="exp-title">Описание (что купили):</label>
        <input type="text" id="exp-title" placeholder="Например: Кофе и круассан">

        <label for="exp-amount">Сумма (в рублях):</label>
        <input type="number" id="exp-amount" placeholder="350">

        <label for="exp-date">Дата:</label>
        <input type="date" id="exp-date">

        <button id="add-btn" class="add-btn">Добавить в список</button>
    </div>

    <h3>📋 Мои расходы:</h3>
    <div id="expenses-list"></div>
</div>

<script src="script.js"></script>
</body>
</html>
