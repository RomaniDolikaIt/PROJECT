<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изменение атрибутов</title>
</head>
<body>
<img id="image" src="/images_webp/funny-clunck-hq-webp.webp" alt="image 1">
<button onclick="changeImage ()">Изменить изображение</button>
<script>
    function changeImage() {document.getElementById("image").src=
        "/images_webp/proicons-iconic-destinations-stamps-webp.webp";
        document.getElementById("image").alt = "image 2";}
</script>

</body>
</html>
