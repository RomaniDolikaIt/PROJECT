<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вывод текста в HTML-документ</title>
</head>
<body>
<p id="textOutput"></p>
<script>
    const textMessage = "Привет, Мир!";
    document.getElementById("textOutput").textContent = textMessage;
</script>
</body>
</html>
