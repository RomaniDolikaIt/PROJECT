<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вывод c помощью prompt</title>
</head>
<body>
<script>
    const name = prompt("Как вас зовут?");
    if (name != null) {
        document.body.innerHTML = "<h1>Привет, " + name + "!</h1>";
    }
</script>
</body>
</html>
