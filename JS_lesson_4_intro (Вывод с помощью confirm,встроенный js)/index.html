<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вывод результатов</title>
</head>
<body>
<h1 id="title"></h1>
<script>
    const isSure = confirm("Вы уверены, что хотите пойти в левую дверь?");
    if (isSure) {
        console.log("Круто! Выбор сделан правильно");
    } else {
        console.log("Выбор ошибочен. Теперь вы должны 100 рублей");
    }
</script>
</body>
</html>
