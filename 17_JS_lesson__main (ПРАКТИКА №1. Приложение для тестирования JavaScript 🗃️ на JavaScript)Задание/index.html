<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>Космический Тест</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="quiz-container">
    <h1>Исследование Космоса 🚀</h1>
    <div id="high-score">Лучший результат: 0</div>

    <div id="setup-screen">
        <button id="start-btn">Начать тест</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="timer">Осталось времени: 10с</div>
        <div id="question-text">Текст вопроса</div>
        <div id="answer-options"></div>
        <div id="feedback" class="hidden"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Тест завершен!</h2>
        <p id="final-score"></p>
        <button id="restart-btn">Перезапустить тест</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
