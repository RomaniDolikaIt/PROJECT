<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>LocalStorage и SessionStorage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Форма для ввода данных -->
<div class="card">
    <h3>📝 Ввод контактных данных</h3>

    <label for="user-name">Имя:</label>
    <input type="text" id="user-name" placeholder="Иван Иванов">

    <label for="user-phone">Телефон:</label>
    <input type="tel" id="user-phone" placeholder="+7 (999) 123-45-67">

    <label for="user-email">Email:</label>
    <input type="email" id="user-email" placeholder="example@mail.com">

    <button id="save-btn">💾 Сохранить в сейф</button>
</div>

<!-- Блок для вывода сохраненных данных на страницу -->
<div class="card info-block" id="display-card">
    <h3>👤 Сохраненный контакт:</h3>
    <p><strong>Имя:</strong> <span id="out-name"></span></p>
    <p><strong>Телефон:</strong> <span id="out-phone"></span></p>
    <p><strong>Email:</strong> <span id="out-email"></span></p>
</div>
<script src="script.js"></script>
</body>
</html>
